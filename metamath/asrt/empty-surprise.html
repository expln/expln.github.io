\n       sense for his purposes, it is less flexible than modern (classical)\\n       logic which _does_ permit empty sets.  If you wish to make claims that\\n       require a nonempty set, you must expressly include that requirement,\\n       e.g., by stating ` E. x ph ` .  Examples of proofs that do this include\\n       ~ barbari , ~ celaront , and ~ cesaro .\\n\\n       For another \\\"surprise\\\" for new users of classical logic, see\\n       ~ alimp-surprise and ~ eximp-surprise .  (Contributed by David A.\\n       Wheeler, 20-Oct-2018.)\",\"v\":\"#0$&%/+&1/\",\"pa\":\"-.3##'%\",\"r\":\"-*#'%$\",\"p\":[\"1ÂŠÂŠ15ÂŠ29ÂŠÂŠ0ÂŠÂŠÂŠ&$\",\"2ÂŠÂŠ15ÂŠ22ÂŠÂŠ0ÂŠÂŠÂŠ0#\",\"3ÂŠÂŠ15ÂŠ34ÂŠÂŠ0ÂŠÂŠÂŠ/%\",\"4ÂŠ$%&ÂŠ2ÂŠ30ÂŠ&$ 0# /%ÂŠ3ÂŠ&*#'%$ÂŠ# # $ $ % %ÂŠ&*#'%$\",\"6ÂŠ%ÂŠ2ÂŠ31ÂŠ0#ÂŠ1ÂŠ/#ÂŠ# #ÂŠ/#\",\"8ÂŠ)&ÂŠ2ÂŠ23ÂŠ/% /1ÂŠ2ÂŠ&%'1ÂŠ% # 1 %ÂŠ&#'%\",\"10ÂŠ+$ÂŠ2ÂŠ20ÂŠ&$ &+ÂŠ2ÂŠ&($,+)ÂŠ$ #'% + $ÂŠ&(#'%,$)\",\"12ÂŠ-%ÂŠ2ÂŠ21ÂŠ&$ 0#ÂŠ2ÂŠ&*#$ÂŠ# # $ (#'%,$)ÂŠ&*#(#'%,$)\",\"14ÂŠ$ÂŠ2ÂŠ28ÂŠ&$ÂŠ1ÂŠ&.$ÂŠ$ $ÂŠ&.$\",\"15ÂŠ+1ÂŠ2ÂŠ20ÂŠ&$ &+ÂŠ2ÂŠ&($,+)ÂŠ$ #'% + .$ÂŠ&(#'%,.$)\",\"17ÂŠ2%ÂŠ2ÂŠ21ÂŠ&$ 0#ÂŠ2ÂŠ&*#$ÂŠ# # $ (#'%,.$)ÂŠ&*#(#'%,.$)\",\"20ÂŠÂŠ24ÂŠ32ÂŠÂŠ0ÂŠÂŠÂŠ-.3##'%\",\"21ÂŠ+$%7ÂŠ18ÂŠ26ÂŠ&$ &+ 0# -.3#$ÂŠ3ÂŠ-(*#($,+)4*#($,.+))ÂŠ# # $ #'% + $ÂŠ-(*#(#'%,$)4*#(#'%,.$))\",\"22ÂŠ/48ÂŠ18ÂŠ27ÂŠ&$ &+ -($4+)ÂŠ2ÂŠ-$ÂŠ$ *#(#'%,$) + *#(#'%,.$)ÂŠ-*#(#'%,$)\",\"26ÂŠ$%&ÂŠ2ÂŠ25ÂŠ&$ 0# /%ÂŠ3ÂŠ-(*#'%$6*#(#'%,$))ÂŠ# # $ $ % %ÂŠ-(*#'%$6*#(#'%,$))\",\"27ÂŠ'/9=ÂŠ18ÂŠ33ÂŠ&$ &+ -+ -($6+)ÂŠ2ÂŠ-$ÂŠ$ *#'%$ + *#(#'%,$)ÂŠ-*#'%$\"]}")
